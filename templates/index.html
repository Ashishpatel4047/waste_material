<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waste Detection AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    margin-top: 50px;
}

.upload-box {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

button {
    background: #2c5364;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00c6ff;
}

#preview {
    margin-top: 15px;
    max-width: 300px;
    border-radius: 10px;
    display: none;
}

.result-box {
    margin-top: 30px;
}

.result-box img {
    width: 350px;
    border-radius: 10px;
    margin-top: 15px;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: rgba(255,255,255,0.2);
    margin: 5px;
    padding: 8px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🗑️ Waste Detection AI</h1>

    <div class="upload-box">
        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" id="fileInput" required>
            <br><br>
            <button type="submit">Upload & Detect</button>
        </form>

        <!-- preview -->
        <img id="preview">
    </div>

    {% if image_path %}
    <div class="result-box">
        <h2>📊 Detection Result</h2>

        <img src="{{ image_path }}">

        <h3>🧠 Objects Found ({{ count }})</h3>
        <ul>
            {% for obj in objects %}
                <li>{{ obj }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

<script>
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        preview.style.display = "block";
        preview.src = URL.createObjectURL(file);
    }
});
</script>

</body>
</html>
